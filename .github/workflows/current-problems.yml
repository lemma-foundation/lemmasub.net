name: Refresh current problems

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: current-problems
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Export current problems
        working-directory: site
        env:
          CURRENT_PROBLEMS_URL: https://api.lemmasub.net/current-problems.json
        run: |
          curl --fail --silent --show-error --location "$CURRENT_PROBLEMS_URL" --output data/current-problems.json
          python -m json.tool data/current-problems.json >/dev/null

      - name: Commit snapshot
        working-directory: site
        run: |
          if git diff --quiet -- data/current-problems.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current-problems.json
          git commit -m "Update current problems snapshot"
          git push
