name: Refresh current problems

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: current-problems
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout Lemma
        uses: actions/checkout@v4
        with:
          repository: lemma-foundation/lemma
          path: lemma

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lemma
        working-directory: lemma
        run: python -m pip install .

      - name: Export current problems
        working-directory: lemma
        run: python scripts/export_current_problems.py --output ../site/data/current-problems.json

      - name: Commit snapshot
        working-directory: site
        run: |
          if git diff --quiet -- data/current-problems.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current-problems.json
          git commit -m "Update current problems snapshot"
          git push
